services:
  app:
    build: .
    ports:
      - "3100:3100"
    restart: unless-stopped
    environment:
      # MUST provide a strong token, the application will crash if not set.
      # Share the URL: http://your-server:3100/?token=YOUR_TOKEN_HERE
      - ACCESS_TOKEN=${ACCESS_TOKEN:?ACCESS_TOKEN environment variable must be set!}
